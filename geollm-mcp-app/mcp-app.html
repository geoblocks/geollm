<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoLLM</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .osm-layer {
        filter: grayscale(1);
      }
      .overlay {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: white;
        padding: 12px 16px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 500px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        padding: 8px 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 8px 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #status {
        font-size: 13px;
        color: #555;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="overlay">
      <div class="row">
        <input id="query-input" type="text" placeholder="e.g. Within 5km of Zurich main station" />
        <button id="search-btn">Search</button>
      </div>
      <div id="status"></div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
