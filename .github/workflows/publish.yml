name: Publish

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Semantic Version Release (prepare only)
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"
          push: "false"
          vcs_release: "false"

      - name: Open or update Release PR
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.release.outputs.tag }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH" --force
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore(release): ${{ steps.release.outputs.tag }}" \
              --body "Automated release PR for ${{ steps.release.outputs.tag }}. Merge to trigger publish to PyPI." \
              --base main \
              --head "$BRANCH" \
              --label "autorelease"
          fi

  publish:
    name: Tag, Build & Publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autorelease')
    concurrency:
      group: ${{ github.workflow }}-publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Verify release branch
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" != release/* ]]; then
            echo "ERROR: publish triggered from non-release branch: $BRANCH"
            exit 1
          fi

      - name: Semantic Version Release (tag & release)
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

      - name: Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Upload dist artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
      tag: ${{ steps.release.outputs.tag }}

  deploy:
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.released == 'true'
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distribution-artifacts
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Smoke test
        run: uv run -n --isolated --no-project --with "dist/*.whl" python tests/smoke_check.py

      - name: Publish to PyPI
        run: uv publish
