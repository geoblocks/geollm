services:
  python-backend:
    build:
      context: ../..
      dockerfile: demo/geollm-mcp-app/Dockerfile
      target: python-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SWISSNAMES3D_PATH=/data
      - HOST=0.0.0.0
    volumes:
      - ../../data:/data:ro
    restart: unless-stopped

  ts-server:
    build:
      context: ../..
      dockerfile: demo/geollm-mcp-app/Dockerfile
      target: ts-server
    ports:
      - "3002:3002"
    environment:
      - PYTHON_API_URL=http://python-backend:8000
      - PORT=3002
    depends_on:
      - python-backend
    restart: unless-stopped
